# AI Watch — sources & delivery config
# Edit feed URLs if a source moves them. Add new sources by appending to the list.

sources:
  # ── The Markup ───────────────────────────────────────────────────────
  # Open access. Strong investigative reporting on algorithms & privacy.
  - name: "The Markup"
    paywalled: false
    feeds:
      - "https://themarkup.org/feeds/rss.xml"

  # ── TechCrunch ───────────────────────────────────────────────────────
  # Open. AI category feed cuts most non-AI noise upfront.
  - name: "TechCrunch"
    paywalled: false
    feeds:
      - "https://techcrunch.com/category/artificial-intelligence/feed/"
      - "https://techcrunch.com/category/privacy/feed/"

  # ── 보안뉴스 (Boannews) ──────────────────────────────────────────────
  # Korean security news. Strong on AI-driven privacy/security incidents.
  - name: "보안뉴스"
    paywalled: false
    feeds:
      - "https://www.boannews.com/media/news_rss.xml"

  # ── WSJ ──────────────────────────────────────────────────────────────
  # Paywalled — RSS gives headline + ~1-2 sentences. Used for triage.
  - name: "WSJ"
    paywalled: true
    feeds:
      - "https://feeds.a.dj.com/rss/RSSWSJD.xml"          # Tech
      - "https://feeds.a.dj.com/rss/WSJcomUSBusiness.xml" # US Business

  # ── Bloomberg ────────────────────────────────────────────────────────
  # Bloomberg killed most public RSS. Workaround: Google News scoped.
  - name: "Bloomberg"
    paywalled: true
    feeds:
      - "https://news.google.com/rss/search?q=site:bloomberg.com+(AI+OR+%22artificial+intelligence%22+OR+privacy+OR+regulation)&hl=en-US&gl=US&ceid=US:en"

# ── Delivery ───────────────────────────────────────────────────────────
# Files are always written to ./digests/YYYY-MM-DD.md regardless of flags.

email:
  enabled: false
  to: "you@example.com"          # ← change this
  from: "ai-watch@example.com"   # ← change this (often same as SMTP_USER)

slack:
  enabled: false                 # set true and provide SLACK_WEBHOOK_URL env var
